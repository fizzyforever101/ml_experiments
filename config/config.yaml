data:
  mimic_path: "data/processed/mimic.csv"
  olives:
    img_dir: "/home/hice1/rbrock31/scratch/OLIVES/Prime_FULL"
    labels_csv: "/home/hice1/rbrock31/scratch/OLIVES/ml_centric_labels/Biomarker_Clinical_Data_Images.csv"
    demographics_csv: "/home/hice1/rbrock31/scratch/OLIVES/labels/OCT-DR-demo.csv"
    label_col: "DRT/ME"   # Desired label
    path_col: "Path (Trial/Arm/Folder/Visit/Eye/Image Name)"

model:
  tabular:
    type: "logreg"   # "gbdt" or "logreg"
  image:
    backbone: "resnet18"

training:
  batch_size: 32
  lr: 0.001
  epochs: 25
  seed: 42
  mimic_max_rows: 120000

fairness:
  mimic_protected_attributes: ["race", "gender", "age_group"]
  olives_protected_attributes: ["race", "ethnicity", "gender"]
  mimic_reweight_attribute: "race"
  olives_reweight_attribute: "race"
  olives_threshold_attribute: "race"
  threshold: 0.05

output:
  dir: "results/"
